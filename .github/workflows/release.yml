name: Release

on:
    push:
        branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: read

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        env:
            VEX_UI_REPO_TOKEN: ${{ secrets.VEX_UI_REPO_TOKEN }}
        permissions:
            contents: write
            pull-requests: write
            # OIDC trusted publishing — the runner's id-token authenticates
            # directly to npm, no NPM_TOKEN needed. See ADR-012 in
            # chat-ui-monorepo: when both OIDC and NPM_TOKEN are present,
            # npm CLI prefers the token, defeating supply-chain protections.
            # Trusted publisher must be configured per-package on npmjs.com:
            # https://www.npmjs.com/package/<name>/access — repo
            # vex-protocol/vex-protocol, workflow release.yml.
            # Requires npm CLI >=11.5.1 and Node >=22.14.0 (both satisfied by
            # .tool-versions: node 24.14.0 ships npm 11.x).
            id-token: write
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  registry-url: https://registry.npmjs.org

            - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  run_install: false

            - name: Install dependencies
              run: pnpm install --frozen-lockfile --ignore-scripts

            - name: Build (topo-ordered)
              run: pnpm -r --workspace-concurrency=1 build

            - name: License check
              run: pnpm license:check

            - name: Create Release PR or Publish
              id: changesets
              uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
              with:
                  # version: runs in the "open chore: version packages PR" path.
                  # Root `version` script: `changeset version` THEN
                  # `pnpm -r --if-present run post-version` so any package
                  # that needs post-bump work runs it (e.g. @vex-chat/types
                  # regenerates openapi.json/asyncapi.json so info.version
                  # tracks package.json version).
                  version: pnpm run version
                  # publish: changeset publish shells to `npm publish` per
                  # package, which has confirmed OIDC trusted-publishing
                  # support. We avoid `pnpm publish -r` because pnpm's native
                  # OIDC support is unreliable (pnpm/pnpm#9812 still open as
                  # of 2026, and pnpm v11 dropped npm-CLI delegation for
                  # publish).
                  publish: pnpm exec changeset publish
                  title: "chore: version packages"
                  commit: "chore: version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  # NO NPM_TOKEN. NO NODE_AUTH_TOKEN. An empty string still
                  # defeats OIDC fallback (npm/cli#8976), so the env vars are
                  # not declared at all. Auth is via the OIDC token from
                  # id-token: write.
                  NPM_CONFIG_PROVENANCE: "true"

            - name: Trigger vex-ui dependency bump PR
              if: |
                  steps.changesets.outputs.published == 'true' &&
                  env.VEX_UI_REPO_TOKEN != ''
              env:
                  REPO_TOKEN: ${{ env.VEX_UI_REPO_TOKEN }}
                  PACKAGES_JSON: ${{ steps.changesets.outputs.publishedPackages }}
              run: |
                  set -euo pipefail

                  payload="$(jq -cn \
                      --argjson packages "${PACKAGES_JSON}" \
                      '{
                        event_type: "vex-protocol-published",
                        client_payload: {
                          source_repo: "vex-protocol/vex-protocol",
                          packages: $packages
                        }
                      }')"

                  curl --fail-with-body --silent --show-error \
                      --request POST \
                      --url "https://api.github.com/repos/vex-protocol/vex-ui/dispatches" \
                      --header "Authorization: Bearer ${REPO_TOKEN}" \
                      --header "Accept: application/vnd.github+json" \
                      --header "X-GitHub-Api-Version: 2022-11-28" \
                      --data "${payload}"

            - name: Skip vex-ui dependency bump trigger (no token)
              if: |
                  steps.changesets.outputs.published == 'true' &&
                  env.VEX_UI_REPO_TOKEN == ''
              run: |
                  echo "::warning::Skipping vex-ui dependency bump trigger: secret VEX_UI_REPO_TOKEN is not configured."
