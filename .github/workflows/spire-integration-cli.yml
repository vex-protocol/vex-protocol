name: Spire integration CLI

# Headless Spire integration tests (`integration:cli`): one Docker Compose stack
# per crypto profile; all scenarios run in series on that instance (fresh 10-client
# harness each scenario). Two jobs (tweetnacl + fips).

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    integration-cli:
        name: integration:cli (${{ matrix.crypto }}, all scenarios, Docker :16777)
        runs-on: ubuntu-latest
        timeout-minutes: 90
        concurrency:
            group: spire-integration-cli-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.crypto }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                crypto: [tweetnacl, fips]
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions

            - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  run_install: false

            - name: Get pnpm store directory
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - uses: actions/cache@v4
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # integration:cli imports @vex-chat/libvex → package.json "import": "./dist/index.js";
            # dist/ only exists after building workspace deps (same filter as Spire Dockerfile).
            - name: Build workspace packages for integration harness
              run: pnpm --filter @vex-chat/spire^... build

            - name: Write apps/spire/.env for Compose
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  if [[ "${{ matrix.crypto }}" == "fips" ]]; then
                      mapfile -t lines < <(node scripts/gen-spk-fips.js --raw)
                      fips_flag=true
                  else
                      mapfile -t lines < <(node scripts/gen-spk.js --raw)
                      fips_flag=false
                  fi
                  dev_key="$(openssl rand -hex 16)"
                  {
                      echo "SPK=${lines[0]}"
                      echo "JWT_SECRET=${lines[1]}"
                      echo "DEV_API_KEY=${dev_key}"
                      echo "SPIRE_FIPS=${fips_flag}"
                      echo "DB_TYPE=sqlite3mem"
                  } > .env
                  chmod 600 .env
                  echo "DEV_API_KEY=${dev_key}" >> "$GITHUB_ENV"

            - name: Build and start Spire stack (Docker Compose)
              shell: bash
              working-directory: apps/spire
              run: docker compose up -d --build

            - name: Wait for nginx /status (via published :16777)
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  for _ in $(seq 1 120); do
                      if curl -fsS "http://127.0.0.1:16777/status" >/dev/null; then
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::Spire (via nginx) did not become ready on :16777/status within 120s"
                  docker compose ps || true
                  exit 1

            - name: Run integration CLI (all scenarios, one stack)
              shell: bash
              working-directory: apps/spire
              env:
                  DEV_API_KEY: ${{ env.DEV_API_KEY }}
                  # Post-burst WS waits scale with client count; CI runners can be slow.
                  SPIRE_STRESS_WS_DELIVERY_MS: "90000"
              run: |
                  set -euo pipefail
                  scenarios=(chat noise mixed whoami servers)
                  for s in "${scenarios[@]}"; do
                    echo "::group::integration:cli --scenario ${s} (10 clients, 10 walls)"
                    pnpm integration:cli -- \
                      --host "127.0.0.1:16777" \
                      --walls 10 \
                      --clients 10 \
                      --conc 5 \
                      --scenario "${s}" \
                      --seconds 600 \
                      --stop-on-fail
                    echo "::endgroup::"
                  done

            - name: Stop stack and remove volumes
              if: always()
              shell: bash
              working-directory: apps/spire
              run: docker compose down -v --remove-orphans
