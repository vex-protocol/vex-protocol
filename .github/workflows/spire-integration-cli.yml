name: Spire integration CLI

# Headless Spire integration tests (`integration:cli`): one Docker Compose stack
# per crypto profile; all scenarios run in series on that instance (fresh 4-client
# harness each scenario — lighter on GHA runners). Two jobs (tweetnacl + fips).

on:
    pull_request:
        branches: [master, development]
    push:
        branches: [master, development]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    integration-cli:
        name: integration:cli (${{ matrix.crypto }}, all scenarios, Docker :16777)
        runs-on: ubuntu-latest
        timeout-minutes: 90
        concurrency:
            group: spire-integration-cli-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.crypto }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                include:
                    - crypto: tweetnacl
                      # Lightweight chat owns the strict transport gate; the
                      # broader noise sweep stays telemetry-first while noisy.
                      ws-chat-required-ratio: "0.9"
                      ws-required-ratio: "0.5"
                    # FIPS still sweeps the protocol under the slower crypto
                    # profile, but WS fanout is telemetry-only on GHA runners.
                    - crypto: fips
                      ws-chat-required-ratio: "0"
                      ws-required-ratio: "0"
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions

            - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
              with:
                  run_install: false

            - name: Get pnpm store directory
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - uses: actions/cache@v4
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # integration:cli imports @vex-chat/libvex → package.json "import": "./dist/index.js";
            # dist/ only exists after building workspace deps (same filter as Spire Dockerfile).
            - name: Build workspace packages for integration harness
              run: pnpm --filter @vex-chat/spire^... build

            - name: Write apps/spire/.env for Compose
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  if [[ "${{ matrix.crypto }}" == "fips" ]]; then
                      mapfile -t lines < <(node scripts/gen-spk-fips.js --raw)
                      fips_flag=true
                  else
                      mapfile -t lines < <(node scripts/gen-spk.js --raw)
                      fips_flag=false
                  fi
                  dev_key="$(openssl rand -hex 16)"
                  {
                      echo "SPK=${lines[0]}"
                      echo "JWT_SECRET=${lines[1]}"
                      echo "DEV_API_KEY=${dev_key}"
                      echo "SPIRE_FIPS=${fips_flag}"
                      echo "DB_TYPE=sqlite3mem"
                  } > .env
                  chmod 600 .env
                  echo "DEV_API_KEY=${dev_key}" >> "$GITHUB_ENV"

            - name: Build and start Spire stack (Docker Compose)
              shell: bash
              working-directory: apps/spire
              run: docker compose up -d --build

            - name: Wait for nginx /status (via published :16777)
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  for _ in $(seq 1 120); do
                      if curl -fsS "http://127.0.0.1:16777/status" >/dev/null; then
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::Spire (via nginx) did not become ready on :16777/status within 120s"
                  docker compose ps || true
                  exit 1

            # Compose reports ready before the app is fully warm; GHA runners are
            # slower than laptops — a short pause cuts WS post-burst flakes.
            - name: Brief settle before stress harness
              shell: bash
              run: sleep 8

            - name: Run integration CLI (all scenarios, one stack)
              shell: bash
              working-directory: apps/spire
              env:
                  DEV_API_KEY: ${{ env.DEV_API_KEY }}
                  # Floor for WS waits; `stress-ws-delivery` also scales by client count
                  # and applies ~1.3× when CI/GITHUB_ACTIONS is set.
                  SPIRE_STRESS_WS_DELIVERY_MS: "120000"
                  # Let delayed FIPS notifications settle before the aggregate WS gate.
                  SPIRE_STRESS_WS_FINAL_GRACE_MS: "30000"
                  # Keep CI reporting WS delivery; FIPS is temporarily lower while noisy.
                  SPIRE_STRESS_WS_REQUIRED_RATIO: ${{ matrix.ws-required-ratio }}
                  # Fewer parallel guest witnesses than default 3 — less load on slow runners.
                  SPIRE_STRESS_WS_WITNESS_MAX: "2"
                  SPIRE_STRESS_WS_DUMP_PATH: ${{ runner.temp }}/spire-ws-delivery-${{ matrix.crypto }}.jsonl
              run: |
                  set -euo pipefail
                  scenarios=(chat noise mixed whoami servers)
                  for s in "${scenarios[@]}"; do
                    ws_required="${{ matrix.ws-required-ratio }}"
                    if [[ "${s}" == "chat" ]]; then
                      ws_required="${{ matrix.ws-chat-required-ratio }}"
                    fi
                    echo "::group::integration:cli --scenario ${s} (4 clients, 10 walls, ws>=${ws_required})"
                    SPIRE_STRESS_WS_REQUIRED_RATIO="${ws_required}" pnpm integration:cli -- \
                      --host "127.0.0.1:16777" \
                      --walls 10 \
                      --clients 4 \
                      --conc 2 \
                      --scenario "${s}" \
                      --seconds 600 \
                      --stop-on-fail
                    echo "::endgroup::"
                  done

            - name: Summarize WebSocket delivery telemetry
              if: always()
              shell: bash
              env:
                  SPIRE_STRESS_WS_DUMP_PATH: ${{ runner.temp }}/spire-ws-delivery-${{ matrix.crypto }}.jsonl
              run: |
                  set -euo pipefail
                  if [[ ! -s "${SPIRE_STRESS_WS_DUMP_PATH}" ]]; then
                    echo "No WebSocket delivery telemetry was written." >> "$GITHUB_STEP_SUMMARY"
                    exit 0
                  fi
                  {
                    echo "### WebSocket delivery telemetry (${{ matrix.crypto }})"
                    echo
                    echo '```jsonl'
                    cat "${SPIRE_STRESS_WS_DUMP_PATH}"
                    echo '```'
                  } >> "$GITHUB_STEP_SUMMARY"

            - name: Stop stack and remove volumes
              if: always()
              shell: bash
              working-directory: apps/spire
              run: docker compose down -v --remove-orphans
