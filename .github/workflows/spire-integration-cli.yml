name: Spire integration CLI

# Headless Spire integration tests (`integration:cli`): one Docker Compose stack
# per crypto profile; stable scenarios run in series on that instance (fresh
# 4-client harness each scenario — lighter on GHA runners). FIPS integration is tracked
# separately in VEX-113 while that profile's realtime path is unstable.

on:
    pull_request:
        branches: [master, development]
    push:
        branches: [master]
    workflow_dispatch:

permissions:
    contents: read

jobs:
    integration-cli:
        name: integration:cli (${{ matrix.crypto }}, stable scenarios, Docker :16777)
        runs-on: ubuntu-latest
        timeout-minutes: 90
        concurrency:
            group: spire-integration-cli-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}-${{ matrix.crypto }}
            cancel-in-progress: true
        strategy:
            fail-fast: false
            matrix:
                crypto: [tweetnacl]
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .tool-versions

            - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
              with:
                  run_install: false

            - name: Get pnpm store directory
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - uses: actions/cache@v6
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            # integration:cli imports @vex-chat/libvex → package.json "import": "./dist/index.js";
            # dist/ only exists after building workspace deps (same filter as Spire Dockerfile).
            - name: Build workspace packages for integration harness
              run: pnpm --filter @vex-chat/spire^... build

            - name: Write apps/spire/.env for Compose
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  if [[ "${{ matrix.crypto }}" == "fips" ]]; then
                      mapfile -t lines < <(node scripts/gen-spk-fips.js --raw)
                      fips_flag=true
                  else
                      mapfile -t lines < <(node scripts/gen-spk.js --raw)
                      fips_flag=false
                  fi
                  dev_key="$(openssl rand -hex 16)"
                  {
                      echo "SPK=${lines[0]}"
                      echo "JWT_SECRET=${lines[1]}"
                      echo "DEV_API_KEY=${dev_key}"
                      echo "SPIRE_FIPS=${fips_flag}"
                      echo "DB_TYPE=sqlite3mem"
                  } > .env
                  chmod 600 .env
                  echo "DEV_API_KEY=${dev_key}" >> "$GITHUB_ENV"

            - name: Build and start Spire stack (Docker Compose)
              shell: bash
              working-directory: apps/spire
              run: docker compose up -d --build

            - name: Wait for nginx /status (via published :16777)
              shell: bash
              working-directory: apps/spire
              run: |
                  set -euo pipefail
                  for _ in $(seq 1 120); do
                      if curl -fsS "http://127.0.0.1:16777/status" >/dev/null; then
                          exit 0
                      fi
                      sleep 1
                  done
                  echo "::error::Spire (via nginx) did not become ready on :16777/status within 120s"
                  docker compose ps || true
                  exit 1

            # Compose reports ready before the app is fully warm; GHA runners are
            # slower than laptops — a short pause cuts WS post-burst flakes.
            - name: Brief settle before stress harness
              shell: bash
              run: sleep 8

            - name: Run integration CLI (stable scenarios, one stack)
              shell: bash
              working-directory: apps/spire
              env:
                  DEV_API_KEY: ${{ env.DEV_API_KEY }}
                  # Floor for WS waits; `stress-ws-delivery` also scales by client count
                  # and applies ~1.3× when CI/GITHUB_ACTIONS is set.
                  SPIRE_STRESS_WS_DELIVERY_MS: "120000"
                  # Sample several post-wall WS probes per sender so one unlucky token
                  # does not decide the whole realtime check.
                  SPIRE_STRESS_WS_SAMPLES: "3"
              run: |
                  set -euo pipefail
                  if [[ "${{ matrix.crypto }}" == "fips" ]]; then
                    # FIPS P-256 work is much more sensitive to shared-runner CPU
                    # jitter. Keep CI at the minimum concurrency so the job tests
                    # durability without manufacturing WebSocket witness flakes.
                    stress_conc=1
                  else
                    # Local M4 Pro Max survived chat conc=2048 in tweetnacl mode.
                    # Use a much lower CI value to preserve headroom on GHA.
                    stress_conc=16
                  fi
                  scenarios=(chat mixed whoami servers)
                  for s in "${scenarios[@]}"; do
                    echo "::group::integration:cli --scenario ${s} (4 clients, 10 walls, conc ${stress_conc})"
                    pnpm integration:cli -- \
                      --host "127.0.0.1:16777" \
                      --walls 10 \
                      --clients 4 \
                      --conc "${stress_conc}" \
                      --scenario "${s}" \
                      --seconds 600 \
                      --stop-on-fail
                    echo "::endgroup::"
                  done

            - name: Stop stack and remove volumes
              if: always()
              shell: bash
              working-directory: apps/spire
              run: docker compose down -v --remove-orphans
