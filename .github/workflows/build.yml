name: Build

on:
    pull_request:
        branches: [master]
    push:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    checks:
        name: build/test/lint
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
              with:
                  node-version-file: .tool-versions

            - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
              with:
                  run_install: false

            - name: Get pnpm store directory
              shell: bash
              run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

            - uses: actions/cache@v5
              with:
                  path: ${{ env.STORE_PATH }}
                  key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: ${{ runner.os }}-pnpm-store-

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Build (topo-ordered)
              run: pnpm -r --workspace-concurrency=1 build

            - name: Test
              run: pnpm test

            - name: Lint (includes copyright header check via eslint-plugin-headers)
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

            - name: License check
              run: pnpm license:check

            - name: publint per package (lint:pkg = publint --strict)
              run: pnpm lint:pkg

            - name: arethetypeswrong per package (lint:types = attw)
              run: pnpm lint:types

            - name: api-extractor per package (lint:api)
              run: pnpm lint:api

            - name: api-extractor drift gate
              run: |
                  set -euo pipefail
                  if ! git diff --exit-code -- 'packages/*/api/'; then
                      echo "::error::Public API report drift detected. Run 'pnpm lint:api' locally and commit the regenerated api/*.api.md files."
                      exit 1
                  fi

            - name: spec drift (types — openapi.json/asyncapi.json)
              run: pnpm specs:check

            - name: spec lint (spectral on openapi.json/asyncapi.json)
              run: pnpm lint:specs

            - name: Socket security scan
              if: |
                  github.event_name == 'pull_request' &&
                  github.event.pull_request.head.repo.full_name == github.repository
              run: pnpm dlx @socketsecurity/cli@1.1.84 ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

            - name: Check for changeset (non-bot, non-release PRs only)
              if: |
                  github.event_name == 'pull_request' &&
                  github.actor != 'dependabot[bot]' &&
                  !startsWith(github.event.pull_request.head.ref, 'changeset-release/')
              run: pnpm exec changeset status --since=origin/master
