name: Auto Changeset

on:
    pull_request:
        types: [opened, synchronize]

concurrency:
    group: auto-changeset-${{ github.event.pull_request.number }}
    cancel-in-progress: true

jobs:
    generate-changeset:
        if: |
            github.event.pull_request.user.type != 'Bot' &&
            !startsWith(github.event.pull_request.title, 'chore: version packages') &&
            github.event.pull_request.head.repo.full_name == github.repository
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            id-token: write
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  ref: ${{ github.head_ref }}

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - run: npm ci --ignore-scripts --prefer-offline

            - name: Configure git
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

            - name: Check existing changeset
              id: check
              run: |
                  if npx changeset status --since=origin/master 2>/dev/null; then
                    echo "exists=true" >> $GITHUB_OUTPUT
                  else
                    echo "exists=false" >> $GITHUB_OUTPUT
                  fi

            # Build the PR's current source so Claude can diff the compiled
            # output against what's currently published. This turns "did the
            # public API change?" into a byte-level question instead of a
            # judgment call on the source diff.
            - name: Build PR
              if: steps.check.outputs.exists == 'false'
              run: npm run build

            - name: Download published tarball
              if: steps.check.outputs.exists == 'false'
              run: |
                  PKG=$(node -pe "require('./package.json').name")
                  LATEST=$(npm view "$PKG" version)
                  mkdir -p /tmp/npm-published
                  TARBALL=$(npm view "$PKG"@"$LATEST" dist.tarball)
                  curl -sL "$TARBALL" | tar -xzf - -C /tmp/npm-published --strip-components=1
                  echo "PUBLISHED_VERSION=$LATEST" >> $GITHUB_ENV
                  echo "PUBLISHED_DIR=/tmp/npm-published" >> $GITHUB_ENV
                  echo "Downloaded @$LATEST for comparison"

            - name: Generate changeset with Claude
              if: steps.check.outputs.exists == 'false'
              uses: anthropics/claude-code-action@21302532c2959a4f8f5e445004f617ef8b7b1dd7 # v1
              with:
                  anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
                  prompt: |
                      You are a release engineer for the `@vex-chat/spire` NodeJS
                      server. Your job is to generate a changeset file for this PR
                      that accurately describes the user-visible impact — OR an empty
                      changeset if there is no user-visible impact.

                      ## Step 1 — read the repo's rules first

                      Before doing anything else:

                      1. Read `AGENTS.md`. It is the source of truth for what counts
                         as user-visible in this repo and what belongs in a changeset.
                      2. Read the top few entries of `CHANGELOG.md`. Match their voice,
                         length, and structure — those entries are the house style.
                      3. Read the PR's commit messages with:
                           git log --format='%s%n%b%n---' origin/master..HEAD
                         Human authors usually put the "why" in the commit body. Use
                         this as a strong prior for both the semver bump and the
                         framing of the summary.
                      4. Look at the changed files:
                           git diff --name-only origin/master...HEAD
                         And confirm no changeset already exists:
                           ls .changeset/

                      ## Step 2 — decide if the change is user-visible

                      This is the critical call. A change is **user-visible** only if
                      it affects what an operator of `@vex-chat/spire@latest` sees when
                      they install and run the server. The published tarball ships:

                      - `dist/` — compiled JS + d.ts
                      - `src/` — shipped for operator auditability
                      - `package.json`, `LICENSE`

                      Files that are **not** user-visible and should NOT trigger a
                      version bump:

                      - `.github/` (workflows, dependabot config)
                      - `.changeset/` config (but not the actual changeset files)
                      - `AGENTS.md`, `CHANGELOG.md` itself
                      - Root configs: `tsconfig*.json`, `eslint.config.js`,
                        `.prettierrc`, `mise.toml`, `.tool-versions`, `vitest.config.ts`
                      - `src/__tests__/**` — vitest unit tests are excluded from the
                        published tarball's footprint via `tsconfig.build.json` when
                        one exists, or simply by the test file convention
                      - `scripts/` (developer utilities; not shipped)
                      - `services/` (sibling service helpers; not shipped)
                      - `public/` (static docs assets served by the running server,
                        not shipped on npm)
                      - `package-lock.json` (by itself; `package.json` matters only
                        if the `dependencies` / `files` / `engines` / runtime
                        behavior fields changed)

                      ## Step 3 — verify against published npm (when src/ changed)

                      If the diff touches `src/` (non-test files) or the user-visible
                      fields of `package.json`, verify the claim by comparing the
                      freshly-built `dist/` against what's currently published.

                      `npm ci` and `npm run build` have already run in this job. The
                      published tarball has been downloaded and extracted to
                      `$PUBLISHED_DIR` (see env). Compare them:

                          diff -ru "$PUBLISHED_DIR/dist" ./dist || true

                      **Interpret the diff honestly:**

                      - Empty diff (or only comment / sourcemap / whitespace changes)
                        → NOT user-visible, even if `src/` changed
                      - New server endpoints, new config options, new env vars → minor
                      - Removed endpoints, breaking config migrations, required env
                        vars that weren't required before → major
                      - Bug fixes in request handling, database queries, or wire
                        protocol adherence (same surface, different runtime behavior)
                        → patch

                      ## Step 4 — choose the output

                      - **Empty changeset** — if the diff vs `origin/master` touches
                        only non-user-visible files, OR if the built `dist/` matches
                        what's published byte-for-byte (modulo sourcemaps). Write the
                        file with ONLY:

                          ---
                          ---

                        No frontmatter entry, no description body.

                      - **Patch** — bugfix, dep bump that affects runtime behavior in
                        a backward-compatible way, internal rewrite with identical
                        observable behavior.

                      - **Minor** — new endpoints, new middleware, new config options,
                        new optional env vars. Pre-1.0 semver: this is ALSO where
                        breaking changes go (not major) per the 0.x convention.

                      - **Major** — only once spire reaches 1.0.0. Pre-1.0, use minor
                        for breaking changes and call them out explicitly in the body.

                      **Bias hard toward empty.** When in doubt between patch and
                      empty, prefer empty.

                      ## Step 5 — write the changeset

                      Write to `.changeset/<short-slug>.md` where `<short-slug>` is
                      2–4 lowercase dash-separated words derived from the PR title
                      or the primary commit.

                      **For a non-empty changeset**, the format is:

                          ---
                          "<package-name>": <bump>
                          ---

                          <1–3 sentences describing the user-visible impact, in the
                          same voice as CHANGELOG.md's top entries. Lead with what
                          operators should DO differently, not what you changed
                          internally.>

                      Read `package.json` to get the package name — don't hardcode
                      it.

                      **For an empty changeset**, the format is exactly:

                          ---
                          ---

                      ## Step 6 — commit and push

                          git add .changeset/
                          git commit -m "chore: add changeset"
                          git push origin HEAD:${{ github.head_ref }}

                      ## Budget

                      Keep this under 10 tool calls. Decision tree: read AGENTS.md +
                      CHANGELOG.md + git log + diff filenames → decide visibility →
                      (if src/ touched) run one or two diff commands against
                      $PUBLISHED_DIR → write one file → commit + push. Don't explore
                      the repo beyond what's needed.
                  claude_args: |
                      --allowedTools "Bash(git diff:*),Bash(git log:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(ls:*),Bash(cat:*),Bash(diff:*),Read,Write,Grep,Glob"
