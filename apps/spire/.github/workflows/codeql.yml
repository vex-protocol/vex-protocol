name: CodeQL

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]
    schedule:
        - cron: "0 6 * * 1"

jobs:
    analyze:
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
            security-events: write
        strategy:
            matrix:
                language: ["javascript-typescript"]
        steps:
            - uses: actions/checkout@v4
            - uses: github/codeql-action/init@v3
              with:
                  languages: ${{ matrix.language }}
            - uses: github/codeql-action/analyze@v3
