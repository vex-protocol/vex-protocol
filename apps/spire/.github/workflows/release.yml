name: Release

on:
    push:
        branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            # Required for `npm publish --provenance`. Gives the runner an
            # OIDC token so npm can attest "this tarball was built by this
            # workflow at this commit". Does NOT require npm trusted
            # publishing — works alongside the classic NPM_TOKEN below.
            id-token: write
        outputs:
            published: ${{ steps.changesets.outputs.published }}
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts --prefer-offline

            - name: Build
              run: npm run build

            # TODO(@dream): switch from NPM_TOKEN to npm trusted publishing
            # once a security key is available on the npmjs.com account.
            # Trusted publishing replaces the NPM_TOKEN entirely — the
            # runner's OIDC token authenticates directly to npm.
            # To switch: configure the trusted publisher at
            # https://www.npmjs.com/package/@vex-chat/spire/access, then
            # remove the NPM_TOKEN env var below. The `--provenance` flag
            # and `id-token: write` permission stay as-is (provenance
            # works with either auth method).
            - name: Create Release PR or Publish
              id: changesets
              uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
              with:
                  publish: npx changeset publish --provenance --access public
                  title: "chore: version packages"
                  commit: "chore: version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Generate SBOM
              if: steps.changesets.outputs.published == 'true'
              run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: steps.changesets.outputs.published == 'true'
              with:
                  name: sbom-${{ github.sha }}
                  path: sbom.json

    # ── Deploy hook — fires only after a successful publish ──────────────
    #
    # Moved out of build.yml so deploy is tightly coupled to releases:
    # every published version goes out, nothing else. Avoids the
    # earlier "deploy on every master merge" path where non-user-visible
    # commits (CI tweaks, docs) would trigger a production deploy.

    deploy-hook:
        name: Trigger deploy hook
        needs: release
        if: needs.release.outputs.published == 'true'
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - name: POST deploy endpoint
              env:
                  DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
                  DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
              run: |
                  if [ -z "$DEPLOY_HOOK_URL" ] || [ -z "$DEPLOY_HOOK_SECRET" ]; then
                    echo "Deploy hook not configured; skipping."
                    exit 0
                  fi
                  curl -sS -X POST "$DEPLOY_HOOK_URL" \
                    -H "Authorization: Bearer ${DEPLOY_HOOK_SECRET}" \
                    -H "Content-Type: application/json" \
                    --data '{}' --fail
