name: Build

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: read

jobs:
    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest
        env:
            npm_config_save_exact: "true"
            npm_config_engine_strict: "true"
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@v2
              with:
                  egress-policy: audit

            - uses: actions/checkout@v4

            - name: Install mise
              uses: jdx/mise-action@v3.5.1

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build
              run: npm run build

            - name: Lint
              run: npm run lint

            - name: Format Check
              run: npm run format:check

            - name: Test
              run: npm test

            - name: Type Coverage
              run: npx type-coverage --at-least 95 --ignore-catch

            - name: Lint package.json
              run: npx npm-package-json-lint .

            - name: Check dependency licenses
              run: npm run license:check

            - name: Security audit
              run: npm audit --audit-level=high || true

    deploy-hook:
        name: Trigger deploy hook
        needs: build
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@v2
              with:
                  egress-policy: audit
            - name: POST deploy endpoint
              env:
                  DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
                  DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
              run: |
                  if [ -z "$DEPLOY_HOOK_URL" ] || [ -z "$DEPLOY_HOOK_SECRET" ]; then
                    echo "Deploy hook not configured; skipping."
                    exit 0
                  fi
                  curl -sS -X POST "$DEPLOY_HOOK_URL" \
                    -H "Authorization: Bearer ${DEPLOY_HOOK_SECRET}" \
                    -H "Content-Type: application/json" \
                    --data '{}' --fail
