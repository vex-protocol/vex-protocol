name: Build

on:
    pull_request:
        branches: [master]

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    # ── Parallel checks ────────────────────────────────────────────────────
    #
    # `build` and `test` keep the ubuntu/macos/windows matrix because
    # spire's runtime has caught real Windows-only issues in the past
    # (native modules like better-sqlite3, path separator differences,
    # case-sensitive filesystem mismatches). The lint/format/types/
    # supply-chain jobs run on ubuntu only — they're deterministic
    # across OSes.

    build:
        name: Build (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest
        steps:
            - name: Harden Runner
              if: runner.os == 'Linux'
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci --ignore-scripts
            - name: tsc
              run: npm run build

    test:
        name: Test (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest
        steps:
            - name: Harden Runner
              if: runner.os == 'Linux'
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci
            - name: Vitest
              run: npm test

    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci --ignore-scripts
            - name: ESLint
              run: npm run lint
            - name: Prettier
              run: npm run format:check
            - name: npm-package-json-lint
              run: npx npm-package-json-lint .

    types:
        name: Types
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci --ignore-scripts
            - name: Type coverage
              run: npx type-coverage

    docker:
        name: Docker
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - name: Create .env
              run: |
                  printf 'SPK=%s\nJWT_SECRET=%s\nDB_TYPE=sqlite3mem\n' \
                    "$(openssl rand -hex 64)" "$(openssl rand -hex 32)" > .env
            - name: Build and start
              run: docker compose up -d --build --wait --wait-timeout 60
            - name: Smoke test
              run: curl -sf http://localhost:8080/status
            - name: Logs on failure
              if: failure()
              run: docker compose logs
            - name: Teardown
              if: always()
              run: docker compose down -v

    supply-chain:
        name: Supply Chain
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false
            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm
            - run: npm ci --ignore-scripts
            - name: License check
              run: npm run license:check
            - name: npm audit
              run: npm audit --audit-level=high
            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli@latest ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

    # ── Single aggregator — the only required status check ────────────────

    ci-ok:
        name: CI OK
        if: always()
        needs:
            - build
            - test
            - lint
            - types
            - docker
            - supply-chain
        runs-on: ubuntu-latest
        steps:
            - name: Fail if any upstream job failed, was skipped, or cancelled
              if: >-
                  ${{ contains(needs.*.result, 'failure')
                      || contains(needs.*.result, 'cancelled')
                      || contains(needs.*.result, 'skipped') }}
              run: |
                  echo "One or more CI jobs did not succeed:"
                  echo '${{ toJSON(needs) }}'
                  exit 1
            - name: All checks passed
              run: echo "All CI jobs succeeded."
