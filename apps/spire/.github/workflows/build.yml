name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v3.5.1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  deploy-hook:
    name: Trigger deploy hook
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: POST deploy endpoint
        env:
          DEPLOY_HOOK_URL: ${{ secrets.DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_SECRET: ${{ secrets.DEPLOY_HOOK_SECRET }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ] || [ -z "$DEPLOY_HOOK_SECRET" ]; then
            echo "DEPLOY_HOOK_URL and/or DEPLOY_HOOK_SECRET not set; skipping deploy hook."
            exit 0
          fi
          curl -fsS -X POST "$DEPLOY_HOOK_URL" \
            -H "Authorization: Bearer ${DEPLOY_HOOK_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{}'
