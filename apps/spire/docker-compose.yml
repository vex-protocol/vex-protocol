services:
    spire:
        build: .
        read_only: true
        tmpfs:
            - /tmp
        volumes:
            - spire-data:/data
        env_file: .env
        user: "1000:1000"
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        pids_limit: 64
        mem_limit: 512m
        memswap_limit: 512m
        networks:
            - internal
        restart: unless-stopped
        logging:
            driver: none
        healthcheck:
            test: ["CMD", "wget", "-qO-", "http://localhost:16777/healthz"]
            interval: 30s
            timeout: 5s
            start_period: 10s
            retries: 3

    nginx:
        image: nginx:alpine
        ports:
            - "8080:8080"
        entrypoint: ["nginx", "-g", "daemon off;"]
        volumes:
            - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
            spire:
                condition: service_healthy
        networks:
            internal:
            egress:
        read_only: true
        tmpfs:
            - /tmp
            - /var/cache/nginx
            - /run
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - CHOWN
            - SETGID
            - SETUID
        pids_limit: 32
        mem_limit: 128m
        memswap_limit: 128m
        restart: unless-stopped
        logging:
            driver: none

networks:
    internal:
        driver: bridge
        internal: true
    egress:
        driver: bridge

volumes:
    spire-data:
