services:
    spire:
        # Build context is the monorepo root so the Dockerfile can resolve
        # workspace:^ deps for @vex-chat/{types,crypto,libvex}.
        build:
            context: ../..
            dockerfile: apps/spire/Dockerfile
        read_only: true
        tmpfs:
            - /tmp
        volumes:
            - spire-data:/data
        # Runtime config/secrets, including SPK, JWT_SECRET, and SPIRE_PASSKEY_*.
        # Keep them out of the image; the server validates them on startup.
        env_file: .env
        environment:
            - API_PORT=${API_PORT:-}
        user: "1000:1000"
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        pids_limit: 64
        mem_limit: 512m
        memswap_limit: 512m
        networks:
            internal:
            # Spire needs outbound HTTPS for Expo push notifications.
            # The internal network is intentionally egress-blocked.
            egress:
        restart: unless-stopped
        # Default json-file logging so `docker compose logs` / `docker logs` work.
        healthcheck:
            test: ["CMD", "/bin/sh", "/app/deploy/spire-container-health.sh"]
            interval: 30s
            timeout: 5s
            start_period: 40s
            retries: 3

    nginx:
        image: nginx:alpine
        ports:
            - "16777:16777"
        # Upstream to Spire must follow its listen port (see src/spireListenPort.ts, deploy/resolve-spire-listen-port.sh)
        environment:
            - API_PORT=${API_PORT:-}
        entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
        volumes:
            - ./deploy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
            - ./deploy/docker-nginx-entrypoint.sh:/docker-entrypoint.sh:ro
            - ./deploy/resolve-spire-listen-port.sh:/opt/resolve-spire-listen-port.sh:ro
        depends_on:
            spire:
                condition: service_healthy
        networks:
            internal:
            egress:
        read_only: true
        tmpfs:
            - /tmp
            - /var/cache/nginx
            - /run
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - CHOWN
            - SETGID
            - SETUID
        pids_limit: 32
        mem_limit: 128m
        memswap_limit: 128m
        restart: unless-stopped

networks:
    internal:
        driver: bridge
        internal: true
    egress:
        driver: bridge

volumes:
    spire-data:
