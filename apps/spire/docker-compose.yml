services:
    spire:
        build: .
        read_only: true
        tmpfs:
            - /tmp
        volumes:
            - spire-data:/data
        env_file: .env
        # tweetnacl (default): SPIRE_FIPS unset / false, SPK from `npm run gen-spk`
        # fips: SPIRE_FIPS=true, SPK from `npm run gen-spk-fips` (P-256 PKCS#8)
        # Shell overrides .env: SPIRE_FIPS=true docker compose up
        environment:
            - SPIRE_FIPS=${SPIRE_FIPS:-false}
            - API_PORT=${API_PORT:-}
        user: "1000:1000"
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        pids_limit: 64
        mem_limit: 512m
        memswap_limit: 512m
        networks:
            - internal
        restart: unless-stopped
        # No Docker json-file log driver: avoids a second copy of stdout/stderr under
        # /var/lib/docker/containers/ on the host. Routine output is only what you see
        # from nginx + Spire when attached (or explicit redirects).
        logging:
            driver: none
        healthcheck:
            test: ["CMD", "/bin/sh", "/app/deploy/spire-container-health.sh"]
            interval: 30s
            timeout: 5s
            # FIPS path awaits async crypto init; keep grace before failed probes count
            start_period: 40s
            retries: 3

    nginx:
        image: nginx:alpine
        ports:
            - "16777:16777"
        # Upstream to Spire must follow its listen port (see src/spireListenPort.ts, deploy/resolve-spire-listen-port.sh)
        environment:
            - SPIRE_FIPS=${SPIRE_FIPS:-false}
            - API_PORT=${API_PORT:-}
        entrypoint: ["/bin/sh", "/docker-entrypoint.sh"]
        volumes:
            - ./deploy/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
            - ./deploy/docker-nginx-entrypoint.sh:/docker-entrypoint.sh:ro
            - ./deploy/resolve-spire-listen-port.sh:/opt/resolve-spire-listen-port.sh:ro
        depends_on:
            spire:
                condition: service_healthy
        networks:
            internal:
            egress:
        read_only: true
        tmpfs:
            - /tmp
            - /var/cache/nginx
            - /run
        security_opt:
            - no-new-privileges:true
        cap_drop:
            - ALL
        cap_add:
            - CHOWN
            - SETGID
            - SETUID
        pids_limit: 32
        mem_limit: 128m
        memswap_limit: 128m
        restart: unless-stopped
        # Same as spire: no duplicate json-file logs on the host.
        logging:
            driver: none

networks:
    internal:
        driver: bridge
        internal: true
    egress:
        driver: bridge

volumes:
    spire-data:
