# Paste into your api.vex.wtf server block (or merge with existing location /spire/).
#
# Trailing slash on proxy_pass strips the /spire/ prefix so the deploy-hook (which
# listens for POST /deploy and GET /healthz on the backend) receives /deploy, not /spire/deploy.
#
# GitHub secret DEPLOY_HOOK_URL should be:
#   https://api.vex.wtf/spire/deploy
#
# Main Spire API stays on location / -> 127.0.0.1:16777 (unchanged).

location /spire/ {
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://127.0.0.1:6868/;
}
