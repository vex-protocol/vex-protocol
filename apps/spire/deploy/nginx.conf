worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # ── Basics ───────────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;

    # Hide nginx version in Server header and error pages.
    server_tokens off;

    # Strip headers that leak upstream software identity.
    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;
    proxy_hide_header X-AspNet-Version;
    proxy_hide_header X-Runtime;


    # ── Logging: privacy-first ───────────────────────────────────────────
    # No access log at all — zero client IPs, user-agents, or paths on disk.
    access_log off;
    # Error log at "crit" only — connection errors can embed client IPs at
    # lower levels. crit catches only fatal misconfigurations.
    error_log /dev/stderr crit;

    # ── Timeouts ─────────────────────────────────────────────────────────
    client_body_timeout   10s;
    client_header_timeout 10s;
    send_timeout          10s;
    keepalive_timeout     65s;

    # ── Buffer / size limits ─────────────────────────────────────────────
    client_max_body_size        1m;
    large_client_header_buffers 2 1k;

    # ── Rate limiting ────────────────────────────────────────────────────
    # 10 req/s burst 20 per real client IP (set by Cloudflare via CF-Connecting-IP).
    limit_req_zone $http_cf_connecting_ip zone=global:10m rate=10r/s;
    limit_req_status 429;

    # ── Cloudflare real-IP trust ─────────────────────────────────────────
    # IPv4 — https://www.cloudflare.com/ips-v4/
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;

    # IPv6 — https://www.cloudflare.com/ips-v6/
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;

    real_ip_header CF-Connecting-IP;

    # ── WebSocket upgrade map ────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ""      close;
    }

    # ── Upstream ─────────────────────────────────────────────────────────
    upstream spire {
        server spire:16777;
    }

    # ── Server ───────────────────────────────────────────────────────────
    server {
        listen 8080;
        server_name _;

        # Reject methods we don't use.
        if ($request_method !~ ^(GET|POST|PUT|DELETE|OPTIONS)$) {
            return 444;
        }

        # Override nginx-generated error pages to strip "nginx" branding.
        error_page 400 =400 @e400;
        error_page 403 =403 @e403;
        error_page 404 =404 @e404;
        error_page 405 =405 @e405;
        error_page 408 =408 @e408;
        error_page 413 =413 @e413;
        error_page 429 =429 @e429;
        error_page 500 =500 @e500;
        error_page 502 =502 @e502;
        error_page 503 =503 @e503;
        error_page 504 =504 @e504;

        location @e400 { default_type application/json; return 400 '{"error":"bad request"}'; }
        location @e403 { default_type application/json; return 403 '{"error":"forbidden"}'; }
        location @e404 { default_type application/json; return 404 '{"error":"not found"}'; }
        location @e405 { default_type application/json; return 405 '{"error":"method not allowed"}'; }
        location @e408 { default_type application/json; return 408 '{"error":"request timeout"}'; }
        location @e413 { default_type application/json; return 413 '{"error":"payload too large"}'; }
        location @e429 { default_type application/json; return 429 '{"error":"too many requests"}'; }
        location @e500 { default_type application/json; return 500 '{"error":"internal server error"}'; }
        location @e502 { default_type application/json; return 502 '{"error":"bad gateway"}'; }
        location @e503 { default_type application/json; return 503 '{"error":"service unavailable"}'; }
        location @e504 { default_type application/json; return 504 '{"error":"gateway timeout"}'; }

        # Defense-in-depth security headers (Helmet also sets these,
        # but nginx catches anything that bypasses Express).
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options        "DENY" always;
        add_header Referrer-Policy        "no-referrer" always;
        add_header X-XSS-Protection       "0" always;
        add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

        # Rate limit all requests.
        limit_req zone=global burst=20 nodelay;

        # ── Main API + WebSocket ─────────────────────────────────────────
        location / {
            proxy_http_version 1.1;
            proxy_pass         http://spire;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket upgrade support.
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            # Long timeout for persistent WS connections.
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # Block dotfiles (e.g. /.env, /.git).
        location ~ /\. {
            deny all;
            return 404;
        }
    }

}
