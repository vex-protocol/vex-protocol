# Vex CLI theme contract.
#
# The current runtime keeps these values as constants in src/vex-chat.js. This
# file is the portable shape for importing/swapping themes once we add theme
# loading.
root: red
ids:
    users:
        palette:
            - monokaiPink
            - monokaiYellow
            - monokaiGreen
            - monokaiBlue
            - monokaiPurple
            - monokaiOrange
            - mint
            - coral
            - gold
            - lime
            - plum
            - sky
            - chartreuse
    targets:
        palette:
            - steel
            - azure
            - indigo
            - teal
            - lavender
    invites:
        palette: targets
