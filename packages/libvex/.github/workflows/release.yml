# Publishes to npm only when you push a version tag (e.g. v0.20.9).
# Does not run on ordinary branch pushes.
#
# After bumping package.json version on the default branch:
#   git tag v$(node -p "require('./package.json').version")
#   git push origin v<that-version>

name: Release

on:
  push:
    tags:
      - "v*"

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Auth for @vex-chat dependencies (GitHub Packages)
        run: |
          echo "@vex-chat:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.CI_KEY }}" >> .npmrc

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-concurrency 1

      - name: Verify git tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          VER=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$VER" ]; then
            echo "::error::Tag $GITHUB_REF_NAME implies version '$TAG' but package.json is '$VER'"
            exit 1
          fi

      - name: Build
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
