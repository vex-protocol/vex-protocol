name: Build

on:
    pull_request:
        branches: [master]
    workflow_dispatch:

concurrency:
    group: build-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"
    # Opt into Node 24 for JS actions before the June 2026 default (see GitHub changelog).
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
    # One ubuntu runner: single npm ci, then all static checks + unit tests + library quality.
    # Cross-OS coverage stays in e2e-prod (matrix). Require job "CI" in branch protection;
    # "CI OK" only reflects e2e-prod (same as before — fork PRs skip e2e).

    checks:
        name: CI
        runs-on: ubuntu-latest
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - run: npm ci --prefer-offline

            - name: TypeScript build
              run: npm run build

            - name: Copyright headers
              run: npm run copyright:check

            - name: ESLint
              run: npm run lint

            - name: Prettier
              run: npm run format:check

            - name: npm-package-json-lint
              run: npx npm-package-json-lint .

            - name: Type coverage
              run: npx type-coverage

            - name: Vitest (unit)
              run: npm test

            - name: publint
              run: npm run lint:pkg

            - name: arethetypeswrong
              run: npm run lint:types

            - name: api-extractor (no public API drift)
              run: |
                  npm run lint:api
                  git diff --exit-code api/

            - name: typedoc (no doc warnings)
              run: npx typedoc --options typedoc.json --treatWarningsAsErrors

            - name: License check
              run: npm run license:check

            - name: npm audit
              run: npm audit --audit-level=high

            - name: Socket security scan
              if: github.event.pull_request.head.repo.full_name == github.repository
              run: npx @socketsecurity/cli ci
              env:
                  SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_API_KEY }}

            - name: Check for changeset
              if: github.actor != 'dependabot[bot]' && !startsWith(github.event.pull_request.head.ref, 'changeset-release/')
              run: npx changeset status --since=origin/master

    # End-to-end (node + browser) against production spire — matrix OS for consumer-facing coverage.
    e2e-prod:
        name: E2E prod (${{ matrix.os }})
        if: github.event.pull_request.head.repo.full_name == github.repository
        needs:
            - checks
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os:
                    - ubuntu-latest
                    - macos-latest
                    - windows-latest
        steps:
            - name: Harden Runner
              if: runner.os == 'Linux'
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - run: npm ci --prefer-offline

            - name: Vitest e2e (node + browser) against api.vex.wtf
              run: npm run test:e2e

    ci-ok:
        name: CI OK
        if: always()
        needs:
            - e2e-prod
        runs-on: ubuntu-latest
        steps:
            - name: Fail if any upstream job failed or was cancelled
              if: >-
                  ${{ contains(needs.*.result, 'failure')
                      || contains(needs.*.result, 'cancelled') }}
              run: |
                  echo "One or more CI jobs did not succeed:"
                  echo '${{ toJSON(needs) }}'
                  exit 1

            - name: All checks passed
              run: echo "All CI jobs succeeded."
