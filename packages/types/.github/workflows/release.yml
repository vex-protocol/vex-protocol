name: Release

on:
    push:
        branches: [master]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
    contents: read

env:
    npm_config_save_exact: "true"
    npm_config_engine_strict: "true"

jobs:
    release:
        name: Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
            # Required for `npm publish --provenance`. Gives the runner an
            # OIDC token so npm can attest "this tarball was built by this
            # workflow at this commit". Does NOT require npm trusted
            # publishing — works alongside the classic NPM_TOKEN below.
            id-token: write
        steps:
            - name: Harden Runner
              uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .tool-versions
                  cache: npm

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build
              run: npm run build

            - name: Check dependency licenses
              run: npm run license:check

            # TODO(@dream): switch from NPM_TOKEN to npm trusted publishing
            # once a security key is available on the npmjs.com account.
            # Trusted publishing replaces the NPM_TOKEN entirely — the
            # runner's OIDC token authenticates directly to npm.
            # To switch: configure the trusted publisher at
            # https://www.npmjs.com/package/@vex-chat/types/access, then
            # remove the NPM_TOKEN env var below. The `--provenance` flag
            # and `id-token: write` permission stay as-is (provenance
            # works with either auth method).
            - name: Create Release PR or Publish
              id: changesets
              uses: changesets/action@e87c8ed249971350e47fab7515075f44eb134e5b # v1.7.0
              with:
                  # `ci:version` wraps `changeset version` with `npm run specs`
                  # so the Version Packages PR also commits regenerated
                  # openapi.json / asyncapi.json — their `info.version`
                  # tracks the bumped package.json version.
                  version: npm run ci:version
                  publish: npx changeset publish --provenance --access public
                  title: "chore: version packages"
                  commit: "chore: version packages"
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Generate SBOM
              if: steps.changesets.outputs.published == 'true'
              run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json

            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
              if: steps.changesets.outputs.published == 'true'
              with:
                  name: sbom-${{ github.sha }}
                  path: sbom.json
