packages:
    - apps/*
    - packages/*

blockExoticSubdeps: true

catalog:
    "@simplewebauthn/server": ^13.3.0
    "@types/node": ^25.6.0
    kysely: ^0.29.2
    msgpackr: ^1.11.9
    tsx: 4.20.6
    typescript: 6.0.2
    uuid: ^14.0.1
    vitest: 4.1.4
    zod: ^4.3.6

catalogMode: strict

minimumReleaseAge: 10080

minimumReleaseAgeExclude:
    - "@vex-chat/cli"
    - "@vex-chat/crypto"
    - "@vex-chat/libvex"
    - "@vex-chat/spire"
    - "@vex-chat/types"

onlyBuiltDependencies:
    - argon2
    - better-sqlite3
    - esbuild
    - msgpackr-extract
